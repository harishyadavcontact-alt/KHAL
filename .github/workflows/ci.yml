name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm --workspace @khal/web run test
      - name: Upload verify report
        uses: actions/upload-artifact@v4
        with:
          name: verify-reports
          path: artifacts/quality
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: |
            artifacts/quality
            apps/web/.next/BUILD_ID
          if-no-files-found: ignore

  smoke:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run route smoke
        id: smoke
        shell: bash
        run: |
          npm --workspace @khal/web exec next start -p 3010 > smoke-server.log 2>&1 &
          for i in {1..45}; do
            if curl -fsS http://localhost:3010 >/dev/null; then
              break
            fi
            sleep 1
          done
          node scripts/smoke-routes.mjs --baseUrl http://localhost:3010
          node scripts/perf-smoke.mjs --baseUrl=http://localhost:3010
          node scripts/qa-report.mjs
      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            smoke-server.log
            artifacts/quality
          if-no-files-found: ignore

  uat-report:
    runs-on: ubuntu-latest
    needs: [smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate UAT capture template artifact
        shell: pwsh
        run: ./scripts/uat-capture.ps1
      - name: Upload UAT template
        uses: actions/upload-artifact@v4
        with:
          name: uat-report-template
          path: artifacts/quality/uat-report.json
          if-no-files-found: error

  security-audit:
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
